name: Release

on:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish this package to pub.dev"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test
      - run: dart pub publish --dry-run

  publish:
    name: Publish to pub.dev
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish == 'true'
    environment: pub.dev
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart pub publish --force
